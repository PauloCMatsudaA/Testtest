# Alembic Configuration — EPIsee Backend
# Documentação: https://alembic.sqlalchemy.org/

[alembic]
# Caminho para os scripts de migração
script_location = alembic

# Template para nomes de arquivos de revisão
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

timezone = UTC

# Número de dígitos do índice de versão (para ordenação)
# truncate_slug_length = 40

# URL do banco de dados — sobrescrita por env_url em alembic/env.py
# Em produção, configure DATABASE_URL no .env
sqlalchemy.url = sqlite+aiosqlite:///./episee.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
